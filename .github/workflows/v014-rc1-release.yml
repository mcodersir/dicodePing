name: Release v0.1.4-rc.5

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-v0.1.4-rc.5
  cancel-in-progress: false

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-build.txt
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
          python tools/verify_version.py
          python -m unittest discover -s tests -v
          python tools/quality_gate.py
          python tools/build_windows.py --skip-install
          Move-Item release/dicodePing-v0.1.4-windows.exe release/dicodePing-v0.1.4-rc.5-windows.exe
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/dicodePing-v0.1.4-rc.5-windows.exe
          if-no-files-found: error

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-build.txt
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl1 libgl1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-util1 libxcb-xkb1 libxkbcommon-x11-0
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
          python tools/verify_version.py
          python -m unittest discover -s tests -v
          python tools/quality_gate.py
          python tools/build_linux.py --skip-install
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/dicodePing-v0.1.4-rc.5-linux-x86_64.tar.gz
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dicodePing_android
    env:
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/dicodePing_android/release.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$ANDROID_KEYSTORE_PATH"
          target="local-maven/ir/dicode/local/libv2ray/26.6.2/libv2ray-26.6.2.aar"
          mkdir -p "$(dirname "$target")"
          curl --fail --location --retry 4 --output "$target" "https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.6.2/libv2ray.aar"
          echo "367d6b2f74e62c974c61210c56802127812be4c9410a83a6b8b6cac765a7595e  $target" | sha256sum --check --strict
          chmod +x gradlew
          ./gradlew --no-daemon lint test assembleRelease
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/dicodePing-v0.1.4-rc.5-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dicodePing_android/release/dicodePing-v0.1.4-rc.5-android.apk
          if-no-files-found: error

  publish:
    needs: [windows, linux, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          mkdir release-assets
          cp artifacts/windows/* release-assets/
          cp artifacts/linux/* release-assets/
          cp artifacts/android/* release-assets/
          (cd release-assets && sha256sum * > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.4-rc.5
          target_commitish: main
          name: dicodePing v0.1.4-rc.5
          body_path: docs/releases/v0.1.4-rc.5.md
          prerelease: true
          fail_on_unmatched_files: true
          files: release-assets/*

  compatibility-bridge:
    # RC.3 and older treated 0.1.4 as newer than any 0.1.4-rc.* tag.  This
    # temporary higher-tagged release carries the exact RC.5 files so those
    # installs receive one last update prompt and can migrate to the fixed
    # updater. Current builds explicitly ignore this release by name.
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          mkdir release-assets
          cp artifacts/windows/* release-assets/
          cp artifacts/linux/* release-assets/
          cp artifacts/android/* release-assets/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.5-rc.0
          target_commitish: main
          name: Compatibility bridge — dicodePing v0.1.4-rc.5
          body: این انتشار فقط برای رساندن اعلان به‌روزرسانی به نسخه‌های قدیمی است؛ فایل‌های آن دقیقاً نسخه v0.1.4-rc.5 هستند.
          prerelease: true
          fail_on_unmatched_files: true
          files: release-assets/*
