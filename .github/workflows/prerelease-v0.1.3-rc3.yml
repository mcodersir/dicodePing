name: v0.1.3-rc.3 Pre-release Publish

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/release-v013-rc3-trigger.txt"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v013-rc3-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source:
    name: Source tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@