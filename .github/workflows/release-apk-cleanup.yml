name: Normalize v0.1.2 Android Release Asset

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release-apk-cleanup.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    name: Keep exactly one Android APK
    if: github.event_name != 'pull_request' || github.head_ref == 'fix/stable-android-jks-signing'
    runs-on: ubuntu-latest
    steps:
      - name: Remove duplicate Android APK assets
        shell: bash
        env:
          GH_TOKEN: ${{