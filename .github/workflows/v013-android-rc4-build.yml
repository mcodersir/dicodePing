name: Build Android rc.4

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build signed Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dicodePing_android
    env:
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/dicodePing_android/release.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore signing key
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$ANDROID_KEYSTORE_PATH"
          test -s "$ANDROID_KEYSTORE_PATH"
      - name: Download and verify Android core
        shell: bash
        run: |
          set -euo pipefail
          target="local-maven/ir/dicode/local/libv2ray/26.6.2/libv2ray-26.6.2.aar"
          mkdir -p "$(dirname "$target")"
          curl --fail --location --retry 4 --retry-all-errors --output "$target" "https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.6.2/libv2ray.aar"
          echo "367d6b2f74e62c974c61210c56802127812be4c9410a83a6b8b6cac765a7595e  $target" | sha256sum --check --strict
      - name: Build and verify release APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon lint test assembleRelease
          apk="app/build/outputs/apk/release/app-release.apk"
          test -f "$apk"
          mkdir -p release
          cp "$apk" release/dicodePing-v0.1.3-rc.4-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-v0.1.3-rc.4-android
          path: dicodePing_android/release/dicodePing-v0.1.3-rc.4-android.apk
          if-no-files-found: error
