name: Build Windows rc.9

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
      - name: Validate and build
        shell: pwsh
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python tools/verify_version.py
          python -m unittest discover -s tests -v
          python tools/quality_gate.py
          python tools/build_windows.py --skip-install
          Move-Item -Force release/dicodePing-v0.1.3-windows.exe release/dicodePing-v0.1.3-rc.9-windows.exe
      - name: Smoke-test packaged GUI startup
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = 'offscreen'
          $env:APPDATA = Join-Path $env:RUNNER_TEMP 'dicodeping-smoke'
          & release/dicodePing-v0.1.3-rc.9-windows.exe --startup-smoke-test
          if ($LASTEXITCODE -ne 0) { throw "Packaged GUI startup failed with exit code $LASTEXITCODE" }
      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-v0.1.3-rc.9-windows
          path: release/dicodePing-v0.1.3-rc.9-windows.exe
          if-no-files-found: error
