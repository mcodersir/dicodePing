name: v0.1.3 Windows Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  source:
    name: Source tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python tools/verify_version.py
      - run: python -m compileall -q app.py app_rc2.py app_rc3.py dicodeping shared tools tests
      - run: python -m unittest discover -s tests -v
      - run: python tools/quality_gate.py

  windows:
    name