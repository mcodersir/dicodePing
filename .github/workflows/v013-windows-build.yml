name: v0.1.3 Windows Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source:
    name: Source tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python tools/verify_version.py
      - run: python -m compileall -q app.py dicodeping shared tools tests
      - run: python -m unittest discover -s tests -v
      - run: python tools/quality_gate.py

  windows:
    name: Build Windows 0.1.3
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
      - shell: pwsh
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python tools/verify_version.py
          python -m compileall -q app.py dicodeping shared tools tests
          python -m unittest discover -s tests -v
          python tools/quality_gate.py
          python tools/build_windows.py --skip-install
      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-v0.1.3-windows
          path: release/dicodePing-v0.1.3-windows.exe
          if-no-files-found: error
