name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    name: Build Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
      - name: Verify release version
        shell: pwsh
        run: python tools/verify_version.py --tag "$env:GITHUB_REF_NAME"
      - name: Run source checks
        shell: pwsh
        run: |
          python -m compileall -q app.py dicodeping shared tools tests
          python -m unittest discover -s tests -v
          python tools/quality_gate.py
      - name: Build Windows executable
        shell: pwsh
        run: python tools/build_windows.py --skip-install
      - uses: actions/upload-artifact@v7
        with:
          name: dicodePing-windows
          path: release/*.exe
          if-no-files-found: error

  android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dicodePing_android
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@v6
      - uses: gradle/actions/setup-gradle@v6
      - name: Download and verify pinned Android Xray core
        shell: bash
        run: |
          set -euo pipefail
          target="local-maven/ir/dicode/local/libv2ray/26.6.2/libv2ray-26.6.2.aar"
          mkdir -p "$(dirname "$target")"
          curl --fail --location --retry 4 --retry-all-errors \
            --output "$target" \
            "https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.6.2/libv2ray.aar"
          echo "367d6b2f74e62c974c61210c56802127812be4c9410a83a6b8b6cac765a7595e  $target" \
            | sha256sum --check --strict
      - name: Verify release version
        run: python3 ../tools/verify_version.py --tag "$GITHUB_REF_NAME"
      - run: chmod +x gradlew
      - name: Lint, test, and build APKs
        run: ./gradlew --no-daemon --stacktrace lint test assembleDebug assembleRelease
      - name: Collect Android release files
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk \
            "release/dicodePing-v${version}-android-debug-signed.apk"
          unsigned="$(find app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          test -n "$unsigned"
          cp "$unsigned" "release/dicodePing-v${version}-android-release-unsigned.apk"
      - uses: actions/upload-artifact@v7
        with:
          name: dicodePing-android
          path: dicodePing_android/release/*.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          path: downloaded-artifacts
      - name: Collect release files, SBOM, licenses, and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find downloaded-artifacts -type f \
            \( -name '*.exe' -o -name '*.apk' \) \
            -exec cp -v '{}' release-assets/ \;
          python tools/generate_sbom.py
          cp artifacts/SBOM.spdx.json release-assets/SBOM.spdx.json
          cp THIRD_PARTY_NOTICES.md release-assets/THIRD_PARTY_NOTICES.md
          zip -q -r "release-assets/dicodePing-${GITHUB_REF_NAME}-licenses.zip" \
            LICENSE THIRD_PARTY_NOTICES.md licenses
          (
            cd release-assets
            find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
          )
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            release-assets/*.exe
            release-assets/*.apk
            release-assets/*.zip
            release-assets/THIRD_PARTY_NOTICES.md
            release-assets/SBOM.spdx.json
            release-assets/SHA256SUMS
      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            release-assets/*.exe
            release-assets/*.apk
          sbom-path: release-assets/SBOM.spdx.json
      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          name: dicodePing ${{ github.ref_name }}
          body_path: docs/releases/${{ github.ref_name }}.md
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*
