name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - ".github/release-trigger.txt"

permissions:
  contents: read

env:
  RELEASE_VERSION: "0.1.3"
  RELEASE_TAG: "v0.1.3"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    name: Build