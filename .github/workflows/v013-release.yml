name: v0.1.3 Release Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-quality:
    name: Source quality and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python tools/verify_version.py
      - run: python -m compileall -q app.py dicodeping shared tools tests
      - run: python -m unittest discover -s tests -v
      - run: python tools/quality_gate.py
