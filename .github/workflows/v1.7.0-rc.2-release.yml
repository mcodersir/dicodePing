name: Release v1.7.0-rc.2

on:
  push:
    branches: [main]
    paths:
      - docs/releases/v1.7.0-rc.2.md
      - .github/workflows/v1.7.0-rc.2-release.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-v1.7.0-rc.2
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-build.txt
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
          python tools/verify_version.py
          python -m unittest discover -s tests -v
          python tools/quality_gate.py
          curl.exe --fail --location --retry 4 --output assets/default-subscription.txt "https://raw.githubusercontent.com/mcodersir/DicodeConfigChecker/refs/heads/main/sub.txt"
          python tools/build_windows.py --skip-install
          Move-Item release/dicodePing-v1.7.0-windows.exe release/dicodePing-v1.7.0-rc.2-windows.exe
          $env:APPDATA = Join-Path $env:RUNNER_TEMP "dicodeping-v170-rc2-smoke"
          $env:LOCALAPPDATA = $env:APPDATA
          $env:DICODEPING_DISCOVERY_SMOKE = "1"
          $env:DICODEPING_STARTUP_SMOKE_REPORT = Join-Path $env:RUNNER_TEMP "windows-discovery-smoke.txt"
          $process = Start-Process -FilePath "release/dicodePing-v1.7.0-rc.2-windows.exe" -ArgumentList "--startup-smoke-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            if (Test-Path $env:DICODEPING_STARTUP_SMOKE_REPORT) { Get-Content $env:DICODEPING_STARTUP_SMOKE_REPORT }
            throw "Packaged Windows discovery smoke test failed with exit code $($process.ExitCode)"
          }
          Get-Content $env:DICODEPING_STARTUP_SMOKE_REPORT
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/dicodePing-v1.7.0-rc.2-windows.exe
          if-no-files-found: error

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-build.txt
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl1 libgl1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-util1 libxcb-xkb1 libxkbcommon-x11-0
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
          python tools/verify_version.py
          python -m unittest discover -s tests -v
          python tools/quality_gate.py
          curl --fail --location --retry 4 --output assets/default-subscription.txt "https://raw.githubusercontent.com/mcodersir/DicodeConfigChecker/refs/heads/main/sub.txt"
          python tools/build_linux.py --skip-install
          mkdir -p "$RUNNER_TEMP/dicodeping-v170-rc2-smoke"
          tar -xzf release/dicodePing-v1.7.0-rc.2-linux-x86_64.tar.gz -C "$RUNNER_TEMP/dicodeping-v170-rc2-smoke"
          smoke_bin="$RUNNER_TEMP/dicodeping-v170-rc2-smoke/dicodePing-v1.7.0-rc.2-linux-x86_64/dicodePing"
          smoke_report="$RUNNER_TEMP/linux-discovery-smoke.txt"
          if ! env QT_QPA_PLATFORM=offscreen XDG_CONFIG_HOME="$RUNNER_TEMP/dicodeping-v170-rc2-config" DICODEPING_DISCOVERY_SMOKE=1 DICODEPING_STARTUP_SMOKE_REPORT="$smoke_report" timeout 35s "$smoke_bin" --startup-smoke-test; then
            test -f "$smoke_report" && cat "$smoke_report"
            exit 1
          fi
          cat "$smoke_report"
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/dicodePing-v1.7.0-rc.2-linux-x86_64.tar.gz
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dicodePing_android
    env:
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/dicodePing_android/release.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$ANDROID_KEYSTORE_PATH"
          target="local-maven/ir/dicode/local/libv2ray/26.6.2/libv2ray-26.6.2.aar"
          mkdir -p "$(dirname "$target")"
          curl --fail --location --retry 4 --output "$target" "https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.6.2/libv2ray.aar"
          echo "367d6b2f74e62c974c61210c56802127812be4c9410a83a6b8b6cac765a7595e  $target" | sha256sum --check --strict
          chmod +x gradlew
          ./gradlew --no-daemon lint test assembleRelease
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/dicodePing-v1.7.0-rc.2-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dicodePing_android/release/dicodePing-v1.7.0-rc.2-android.apk
          if-no-files-found: error

  publish:
    needs: [windows, linux, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          mkdir release-assets
          cp artifacts/windows/* release-assets/
          cp artifacts/linux/* release-assets/
          cp artifacts/android/* release-assets/
          cp docs/releases/v1.7.0-rc.2.md release-assets/RELEASE_NOTES.md
          cp CHANGELOG.md release-assets/
          cp THIRD_PARTY_NOTICES.md release-assets/
          (cd release-assets && sha256sum * > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.7.0-rc.2
          target_commitish: main
          name: dicodePing v1.7.0-rc.2
          body_path: docs/releases/v1.7.0-rc.2.md
          prerelease: true
          fail_on_unmatched_files: true
          files: release-assets/*
