name: Build Linux rc.6

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Linux x86_64 bundle
    # Ubuntu 22.04 produces a bundle with an older glibc baseline than latest,
    # improving compatibility with current desktop distributions.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt
      - name: Install Linux GUI runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxcb-util1 libxcb-xkb1 \
            libxkbcommon-x11-0
      - name: Install and validate
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
          python tools/verify_version.py
          python -m unittest discover -s tests -v
          python tools/quality_gate.py
      - name: Build portable Linux bundle
        run: python tools/build_linux.py --skip-install
      - name: Smoke-test packaged GUI startup
        run: |
          set -euo pipefail
          mkdir -p /tmp/dicodeping-smoke
          tar -xzf release/dicodePing-v0.1.3-rc.6-linux-x86_64.tar.gz -C /tmp/dicodeping-smoke
          binary="/tmp/dicodeping-smoke/dicodePing-v0.1.3-rc.6-linux-x86_64/dicodePing"
          set +e
          sudo env QT_QPA_PLATFORM=offscreen XDG_CONFIG_HOME=/tmp/dicodeping-smoke/config timeout 12s "$binary"
          status=$?
          set -e
          test "$status" -eq 124
      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-v0.1.3-rc.6-linux-x86_64
          path: release/dicodePing-v0.1.3-rc.6-linux-x86_64.tar.gz
          if-no-files-found: error
