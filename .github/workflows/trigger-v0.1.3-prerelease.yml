name: Trigger v0.1.3 Pre-release

on:
  push:
    branches: [main]
    paths:
      - "dicodeping/**"
      - "dicodePing_android/**"
      - "tools/**"
      - "tests/**"
      - "docs/releases/v0.1.3-rc.1.md"
      - ".github/workflows/prerelease-v0.1.3.yml"
      - ".github/workflows/trigger-v0.1.3-prerelease.yml"

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: Start v0.1.3 release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'prerelease-v0.1.3.yml',
              ref: 'main'
            })
