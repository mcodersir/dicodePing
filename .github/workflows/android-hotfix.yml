name: Android v0.1.2 Compatibility Hotfix

on:
  pull_request:
    branches: [main]
    paths:
      - "dicodePing_android/**"
      - ".github/workflows/android-hotfix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-v0.1.2-hotfix
  cancel-in-progress: false

jobs:
  build-and-replace:
    name: Build and replace Android APK
    if: github.event_name != 'pull_request' || github.head_ref == 'fix/android-7-universal-install'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dicodePing_android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4

      - name: Download and verify pinned Android Xray core
        shell: bash
        run: |
          set -euo pipefail
          target="local-maven/ir/dicode/local/libv2ray/26.6.2/libv2ray-26.6.2.aar"
          mkdir -p "$(dirname "$target")"
          curl --fail --location --retry 4 --retry-all-errors \
            --output "$target" \
            "https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.6.2/libv2ray.aar"
          echo "367d6b2f74e62c974c61210c56802127812be4c9410a83a6b8b6cac765a7595e  $target" | sha256sum --check --strict

      - run: chmod +x gradlew

      - name: Lint, test, and build universal signed APK
        run: ./gradlew --no-daemon --stacktrace lint test assembleRelease

      - name: Verify APK compatibility
        shell: bash
        run: |
          set -euo pipefail
          apk="app/build/outputs/apk/release/app-release.apk"
          test -f "$apk"
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            unzip -l "$apk" | grep -q "lib/$abi/"
          done
          mkdir -p release
          cp "$apk" release/dicodePing-v0.1.2-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-android-compatible
          path: dicodePing_android/release/dicodePing-v0.1.2-android.apk
          if-no-files-found: error

      - name: Replace Android asset in v0.1.2 release
        if: github.event_name != 'pull_request' || github.head_ref == 'fix/android-7-universal-install'
        shell: bash
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dicodePing_android/release/dicodePing-v0.1.2-android.apk release-assets/
          gh release download v0.1.2 --pattern "dicodePing-v0.1.2-windows.exe" --dir release-assets
          (
            cd release-assets
            sha256sum dicodePing-v0.1.2-windows.exe dicodePing-v0.1.2-android.apk > SHA256SUMS
          )
          gh release upload v0.1.2 release-assets/dicodePing-v0.1.2-android.apk --clobber
          gh release upload v0.1.2 release-assets/SHA256SUMS --clobber
