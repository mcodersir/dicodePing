name: v0.1.3 Pre-release Publish

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/release-v013-android-smoke-trigger.txt"

permissions:
  contents: write

jobs:
  source:
    name: Source tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
      - run: python -m pip install -r requirements.txt
      - run: python tools/verify_version.py
      - run: python -m compileall -q app.py dicodeping shared tools tests
      - run: python -m unittest discover -s tests -v
      - run: python tools/quality_gate.py

  windows:
    name: Build Windows 0.1.3
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
      - shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
      - shell: pwsh
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python tools/build_windows.py --skip-install
      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-v0.1.3-windows
          path: release/dicodePing-v0.1.3-windows.exe
          if-no-files-found: error

  android:
    name: Build Android 0.1.3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
      - name: Download pinned Android Xray core
        shell: bash
        working-directory: dicodePing_android
        run: |
          set -euo pipefail
          target="local-maven/ir/dicode/local/libv2ray/26.6.2/libv2ray-26.6.2.aar"
          mkdir -p "$(dirname "$target")"
          curl --fail --location --retry 4 --retry-all-errors --output "$target" "https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.6.2/libv2ray.aar"
          echo "367d6b2f74e62c974c61210c56802127812be4c9410a83a6b8b6cac765a7595e  $target" | sha256sum --check --strict
      - name: Build installable Android APK
        shell: bash
        working-directory: dicodePing_android
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace assembleDebug
          apk="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$apk"
          mkdir -p release
          cp "$apk" release/dicodePing-v0.1.3-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-v0.1.3-android
          path: dicodePing_android/release/dicodePing-v0.1.3-android.apk
          if-no-files-found: error

  publish:
    name: Publish v0.1.3-rc.1
    needs:
      - source
      - windows
      - android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: downloaded-artifacts
      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp downloaded-artifacts/dicodePing-v0.1.3-windows/dicodePing-v0.1.3-windows.exe release-assets/
          cp downloaded-artifacts/dicodePing-v0.1.3-android/dicodePing-v0.1.3-android.apk release-assets/
          cd release-assets
          sha256sum dicodePing-v0.1.3-windows.exe dicodePing-v0.1.3-android.apk > SHA256SUMS
      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.3-rc.1
          target_commitish: main
          name: dicodePing v0.1.3-rc.1 — Pre-release
          body_path: docs/releases/v0.1.3-rc.1.md
          prerelease: true
          draft: false
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            release-assets/dicodePing-v0.1.3-windows.exe
            release-assets/dicodePing-v0.1.3-android.apk
            release-assets/SHA256SUMS
