name: v0.1.3 Android Smoke

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/release-v013-android-smoke-trigger.txt"

permissions:
  contents: read

jobs:
  smoke:
    name: Android Java and Gradle smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
      - run: echo "Android workflow parser and toolchain are active"
