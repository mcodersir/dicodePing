name: Release v0.1.3-rc.9

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/v013-rc9-release.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-v0.1.3-rc.9
  cancel-in-progress: false

env:
  RELEASE_TAG: v0.1.3-rc.9

jobs:
  windows:
    name: Windows build and startup validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
      - name: Install build dependencies
        shell: pwsh
