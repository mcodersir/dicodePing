name: Release v0.1.3-rc.9

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/v013-rc9-release.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-v0.1.3-rc.9
  cancel-in-progress: false

env:
  RELEASE_TAG: v0.1.3-rc.9

jobs:
  windows:
    name: Windows build and startup validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
      - name: Validate source and build Windows executable
        shell: pwsh
        run: |
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python tools/verify_version.py
          python -m compileall -q app.py dicodeping shared tools tests
          python -m unittest discover -s tests -v
          python tools/quality_gate.py
          python tools/build_windows.py --skip-install
          Move-Item -Force release/dicodePing-v0.1.3-windows.exe release/dicodePing-v0.1.3-rc.9-windows.exe
      - name: Smoke-test packaged Windows startup
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = 'offscreen'
          $env:APPDATA = Join-Path $env:RUNNER_TEMP 'dicodeping-smoke'
          $process = Start-Process -FilePath 'release/dicodePing-v0.1.3-rc.9-windows.exe' -ArgumentList '--startup-smoke-test' -PassThru
          if (-not $process.WaitForExit(20000)) {
            Stop-Process -Id $process.Id -Force
            throw 'Packaged Windows GUI did not complete its startup smoke test within 20 seconds.'
          }
          if ($process.ExitCode -ne 0) {
            throw "Packaged Windows GUI startup failed with exit code $($process.ExitCode)."
          }
      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-v0.1.3-rc.9-windows
          path: release/dicodePing-v0.1.3-rc.9-windows.exe
          if-no-files-found: error
          retention-days: 14

  linux:
    name: Linux x86_64 build and startup validation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt
      - name: Install Linux GUI runtime libraries
        run: |
