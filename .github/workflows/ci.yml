name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Source-quality only.  Build and release are handled by per-release
# workflows (e.g. .github/workflows/v1.6.0-rc.1-release.yml) that run
# only when a release note is added or when triggered manually.
jobs:
  source-quality:
    name: Python and security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Verify synchronized version
        run: python tools/verify_version.py
      - name: Compile Python
        run: python -m compileall -q app.py app_rc2.py app_rc3.py dicodeping shared tools tests
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Security quality gate
        run: python tools/quality_gate.py
      - name: Generate SBOM
        run: python tools/generate_sbom.py
      - uses: actions/upload-artifact@v4
        with:
          name: source-sbom
          path: artifacts/SBOM.spdx.json
          if-no-files-found: error
