name: CI and Release

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-quality:
    name: Python and security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Verify synchronized version
        run: python tools/verify_version.py
      - name: Compile Python
        run: python -m compileall -q app.py app_rc2.py app_rc3.py dicodeping shared tools tests
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Security quality gate
        run: python tools/quality_gate.py
      - name: Generate SBOM
        run: python tools/generate_sbom.py
      - uses: actions/upload-artifact@v4
        with:
          name: source-sbom
          path: artifacts/SBOM.spdx.json
          if-no-files-found: error

  windows:
    name: Build Windows executable
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'release/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
      - name: Verify source version
        shell: pwsh
        run: python tools/verify_version.py
      - name: Run source checks
        shell: pwsh
        run: |
          python -m compileall -q app.py app_rc2.py app_rc3.py dicodeping shared tools tests
          python -m unittest discover -s tests -v
          python tools/quality_gate.py
      - name: Build Windows executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $env:PYTHONUTF8 = '1'
          $env:PYTHONIOENCODING = 'utf-8'
          python tools/build_windows.py --skip-install *>&1 | Tee-Object -FilePath windows-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload Windows diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: windows-build.log
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-v0.1.3-windows
          path: release/dicodePing-v0.1.3-windows.exe
          if-no-files-found: error

  android:
    name: Build one universal JKS-signed Android APK
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dicodePing_android
    env:
      ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/dicodePing-release.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      EXPECTED_CERT_SHA256: 0A:48:33:17:EE:0B:D0:E2:AE:A4:8D:2B:E7:2C:30:F2:06:D3:CC:EB:3F:17:8E:A1:8C:A2:2A:17:D6:CD:FC:C0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore Android release JKS
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          test -s "$ANDROID_KEYSTORE_PATH"
      - name: Verify signing certificate
        shell: bash
        run: |
          set -euo pipefail
          actual="$(keytool -list -v \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" | awk -F': ' '/SHA256:/{print $2; exit}')"
          test "$actual" = "$EXPECTED_CERT_SHA256"
      - name: Download and verify pinned Android Xray core
        shell: bash
        run: |
          set -euo pipefail
          target="local-maven/ir/dicode/local/libv2ray/26.6.2/libv2ray-26.6.2.aar"
          mkdir -p "$(dirname "$target")"
          curl --fail --location --retry 4 --retry-all-errors \
            --output "$target" \
            "https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.6.2/libv2ray.aar"
          echo "367d6b2f74e62c974c61210c56802127812be4c9410a83a6b8b6cac765a7595e  $target" | sha256sum --check --strict
      - run: chmod +x gradlew
      - name: Lint, test, and build release APK
        run: ./gradlew --no-daemon --stacktrace lint test assembleRelease
      - name: Verify one universal signed APK
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t apks < <(find app/build/outputs/apk/release -type f -name '*.apk' -print)
          test "${#apks[@]}" -eq 1
          apk="${apks[0]}"
          jarsigner -verify -strict -certs "$apk" >/dev/null
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            unzip -l "$apk" | grep -q "lib/$abi/"
          done
          mkdir -p release
          cp "$apk" release/dicodePing-v0.1.3-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-v0.1.3-android
          path: dicodePing_android/release/dicodePing-v0.1.3-android.apk
          if-no-files-found: error

  publish:
    name: Publish v0.1.3-rc.3 pre-release
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'release/')
    needs: [source-quality, windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: downloaded-artifacts
      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp downloaded-artifacts/dicodePing-v0.1.3-windows/dicodePing-v0.1.3-windows.exe release-assets/
          cp downloaded-artifacts/dicodePing-v0.1.3-android/dicodePing-v0.1.3-android.apk release-assets/
          (
            cd release-assets
            sha256sum dicodePing-v0.1.3-windows.exe dicodePing-v0.1.3-android.apk > SHA256SUMS
          )
      - name: Publish pre-release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.3-rc.3
          target_commitish: main
          name: dicodePing v0.1.3-rc.3 — Pre-release
          body_path: docs/releases/v0.1.3-rc.3.md
          prerelease: true
          draft: false
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            release-assets/dicodePing-v0.1.3-windows.exe
            release-assets/dicodePing-v0.1.3-android.apk
            release-assets/SHA256SUMS
