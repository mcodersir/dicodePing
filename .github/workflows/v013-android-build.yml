name: v0.1.3 Android Build

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/release-v013-android-build-trigger.txt"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Build universal Android 0.1.3
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/dicodePing-release.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore JKS
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          test -s "$ANDROID_KEYSTORE_PATH"
      - name: Download Android core
        shell: bash
        working-directory: dicodePing_android
        run: |
          target="local-maven/ir/dicode/local/libv2ray/26.6.2/libv2ray-26.6.2.aar"
          mkdir -p "$(dirname "$target")"
          curl --fail --location --retry 4 --output "$target" "https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.6.2/libv2ray.aar"
          echo "367d6b2f74e62c974c61210c56802127812be4c9410a83a6b8b6cac765a7595e  $target" | sha256sum --check
      - name: Build Android
        shell: bash
        working-directory: dicodePing_android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace lint test assembleRelease
          test -f app/build/outputs/apk/release/app-release.apk
          jarsigner -verify -strict app/build/outputs/apk/release/app-release.apk >/dev/null
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            unzip -l app/build/outputs/apk/release/app-release.apk | grep -q "lib/$abi/"
          done
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/dicodePing-v0.1.3-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: dicodePing-v0.1.3-android
          path: dicodePing_android/release/dicodePing-v0.1.3-android.apk
          if-no-files-found: error
