name: Bug report
description: Report a reproducible defect without secrets
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Never paste live profiles, UUIDs, subscription URLs, keys, or unredacted logs."
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows 10, Windows 11, Android]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
